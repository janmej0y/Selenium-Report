    <title>Selenium Report</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --panel: #ffffff;
            --ink: #182230;
            --muted: #667085;
            --line: #d9e2ec;
            --blue: #2563eb;
            --green: #11845b;
        }
        * {
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            color: var(--ink);
            background:
                radial-gradient(circle at 18% 12%, rgba(37, 99, 235, .12), transparent 30%),
                linear-gradient(180deg, #ffffff 0, var(--bg) 70%);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(680px, calc(100% - 32px));
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, .92);
            box-shadow: 0 22px 60px rgba(16, 24, 40, .12);
            text-align: center;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            padding: 8px 12px;
            border-radius: 999px;
            color: var(--green);
            background: #ecfdf3;
            font-size: 13px;
            font-weight: 800;
        }
        h1 {
            margin: 0 0 12px;
            font-size: clamp(30px, 5vw, 48px);
            line-height: 1;
            letter-spacing: 0;
        }
        p {
            margin: 0 auto 24px;
            max-width: 520px;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 8px;
            color: #ffffff;
            background: var(--blue);
            font-weight: 800;
            text-decoration: none;
        }
        a:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <main>
        <div class="badge">Latest report ready</div>
        <h1>Selenium Test Report</h1>
